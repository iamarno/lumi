name: CI

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Create reports directory
        run: mkdir -p reports

      - name: Test
        id: test
        run: npm run test:ci
        continue-on-error: true

      - name: Publish test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Jest Tests
          path: reports/junit.xml
          reporter: jest-junit

      - name: Fail if tests failed
        if: steps.test.outcome == 'failure'
        run: exit 1

  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push'
    permissions:
      contents: write
      packages: write
      id-token: write   # needed for keyless cosign signing

    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2

      - name: Sign image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Generate SBOM with Syft
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30
          upload-release-assets: false

      - name: Sign SBOM
        run: |
          cosign attest --yes \
            --predicate sbom.spdx.json \
            --type spdxjson \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      # - name: Scan image with Grype
      #   uses: anchore/scan-action@v7
      #   continue-on-error: true
      #   with:
      #     image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}
      #     fail-build: false
      #     severity-cutoff: high
      #     output-format: json
      #     output-file: grype-results.json

      # - name: Publish Grype results to job summary
      #   if: always() && hashFiles('grype-results.json') != ''
      #   run: |
      #     echo "## Grype Vulnerability Scan" >> $GITHUB_STEP_SUMMARY
      #     echo '```' >> $GITHUB_STEP_SUMMARY
      #     {
      #       jq -r '
      #         ["Severity","Package","Version","Fix"],
      #         ["--------","-------","-------","---"],
      #         (.matches[]
      #           | select(.vulnerability.severity == "High" or .vulnerability.severity == "Critical")
      #           | [.vulnerability.severity, .artifact.name, .artifact.version, (.vulnerability.fix.versions[0] // "none")])
      #         | @tsv' grype-results.json 2>/dev/null || echo "No HIGH/CRITICAL vulnerabilities found."
      #     } >> $GITHUB_STEP_SUMMARY
      #     echo '```' >> $GITHUB_STEP_SUMMARY

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "value=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            ## Container image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.value }}
            ```

            **Platforms:** `linux/amd64`, `linux/arm64`
