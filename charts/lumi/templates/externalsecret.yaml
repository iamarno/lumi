{{- if and .Values.externalSecrets.enabled (not .Values.existingSecret) }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ include "lumi.fullname" . }}-env
  labels:
    {{- include "lumi.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "lumi.fullname" . }}-env
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: {{ .Values.externalSecrets.corePath }}
    {{- if .Values.modules.enabled }}
    # Module secrets (HASS_TOKEN, GRAFANA_TOKEN, GRAFANA_ALERTS_SECRET, ...)
    # are only synced when modules are deployed — least exposure.
    - extract:
        key: {{ .Values.externalSecrets.modulesPath }}
    {{- end }}
{{- end }}
