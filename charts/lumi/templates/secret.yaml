{{- if and .Values.secretEnv (not .Values.externalSecrets.enabled) (not .Values.existingSecret) }}
# Plain-Secret fallback for clusters without External Secrets Operator.
# Prefer externalSecrets or existingSecret in production.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "lumi.fullname" . }}-env
  labels:
    {{- include "lumi.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.secretEnv }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
{{- end }}
